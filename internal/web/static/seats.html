<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seat Map — Neon Air</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="back-link">← Flights</a>
      <h1 class="logo">Flight <span id="flight-id">—</span></h1>
    </div>
  </header>

  <main class="container">
    <div id="departed-banner" class="banner banner-warning hidden" role="status">
      This flight has already departed. You can still manage your current hold until it expires.
    </div>

    <section class="panel order-panel hidden" id="order-panel">
      <div class="toolbar-row">
        <div>
          <p class="order-label">Order <span id="order-id">—</span></p>
          <p class="order-status">Status: <span id="order-status">—</span></p>
        </div>
        <div class="timer-wrap">
          <span class="timer-label">Hold timer</span>
          <span id="timer-display" class="timer-display">—</span>
        </div>
      </div>
      <div class="toolbar-row actions-row">
        <button type="button" id="confirm-btn" class="btn btn-primary">Confirm seat selection</button>
        <button type="button" id="cancel-btn" class="btn btn-danger">Cancel order</button>
        <button type="button" id="refresh-btn" class="btn btn-secondary">Refresh map</button>
      </div>
    </section>

    <section class="panel seat-toolbar">
      <ul class="legend" aria-label="Seat status legend">
        <li><span class="swatch swatch-available"></span> Available</li>
        <li><span class="swatch swatch-mine"></span> Your hold</li>
        <li><span class="swatch swatch-held"></span> Held (others)</li>
        <li><span class="swatch swatch-booked"></span> Booked</li>
      </ul>
      <p id="selection-summary" class="selection-summary">Select seats to hold, then confirm.</p>
    </section>

    <section id="loading" class="panel status-panel">Loading seat map…</section>
    <section id="error" class="panel error-panel hidden" role="alert"></section>

    <section id="seat-map" class="seat-map-wrap hidden" aria-label="Seat map">
      <div class="seat-map-scroll">
        <div id="seat-grid" class="seat-grid"></div>
      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/seats.js"></script>
</body>
</html>
